<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#7c5cff">
<meta name="description" content="Spellbound — a spelling-bee trainer that hears your child spell, evolves a character with every win, and shows parents exactly where they stand.">
<title>Spellbound — spelling-bee trainer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%90%9D%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Orbitron:wght@600;800&family=Pixelify+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg1,#f3efff);transition:background .35s ease}
  ::selection{background:color-mix(in srgb,var(--accent) 28%,transparent)}
  input,button,select,textarea{font-family:inherit}
  button{cursor:pointer;border:0;background:none}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
  button:focus:not(:focus-visible){outline:none}
  /* ===== token layer — themes remap the SAME names ===== */
  [data-theme]{--bg1:#251b58;--bg2:#322670;--bg3:#1a1342;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);--line:rgba(124,92,255,.22);--text:#f1edff;--muted:#a99fd6;--accent:#7c5cff;--accent2:#ffc83d;--accent3:#ffe1a0;--good:#34e0a1;--bad:#ff6b8a;--display:'Baloo 2',cursive;--body:'Nunito',sans-serif;--mono:'Space Mono',monospace;--entry:'Space Grotesk','Nunito',sans-serif;--glow:0 18px 50px rgba(124,92,255,.4);--chip:rgba(124,92,255,.16);--slw:#fff}
  [data-theme="spellbound"]{--bg1:#251b58;--bg2:#322670;--bg3:#1a1342;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);--line:rgba(124,92,255,.22);--text:#f1edff;--muted:#a99fd6;--accent:#7c5cff;--accent2:#ffc83d;--accent3:#ffe1a0;--good:#34e0a1;--bad:#ff6b8a;--display:'Baloo 2',cursive;--glow:0 18px 50px rgba(124,92,255,.4);--chip:rgba(124,92,255,.16)}
  [data-theme="marquee"]{--bg1:#241f2c;--bg2:#2e2838;--bg3:#1b1724;--line:rgba(232,178,58,.16);--text:#f1ece2;--muted:#aa9f90;--accent:#e8b23a;--accent2:#f0c668;--accent3:#fff4d6;--good:#5fd1a0;--bad:#e2557a;--display:'Bricolage Grotesque',sans-serif;--glow:0 18px 50px rgba(0,0,0,.45);--chip:rgba(232,178,58,.14)}
  [data-theme="aurora"]{--bg1:#1c1e2e;--bg2:#272b42;--bg3:#15171f;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.09);--line:rgba(255,255,255,.12);--text:#eceef6;--muted:#9197b5;--accent:#7c5cff;--accent2:#36d1ff;--accent3:#ffd23f;--good:#34e0a1;--bad:#ff6b6b;--display:'Bricolage Grotesque',sans-serif;--glow:0 18px 48px rgba(124,92,255,.3);--chip:rgba(124,92,255,.15)}
  [data-theme="anime"]{--bg1:#241d2f;--bg2:#2e2439;--bg3:#181320;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.09);--line:rgba(255,77,141,.16);--text:#f6ecf2;--muted:#b39bb0;--accent:#ff4d8d;--accent2:#36e2ff;--accent3:#ffd23f;--good:#34e0a1;--bad:#ff6b6b;--display:'Bricolage Grotesque',sans-serif;--glow:0 0 40px rgba(255,77,141,.3);--chip:rgba(255,77,141,.14)}
  [data-theme="science"]{--bg1:#19212f;--bg2:#222c3a;--bg3:#111722;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.09);--line:rgba(57,255,20,.16);--text:#e8f1ec;--muted:#8ba0a6;--accent:#39ff14;--accent2:#18d6ff;--accent3:#ffd23f;--good:#39ff14;--bad:#ff5d5d;--display:'Orbitron',sans-serif;--glow:0 0 40px rgba(57,255,20,.28);--chip:rgba(57,255,20,.12)}
  [data-theme="origami"]{--bg1:#26211a;--bg2:#312a22;--bg3:#1a1611;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.09);--line:rgba(217,105,74,.16);--text:#f1ebe2;--muted:#b3a795;--accent:#d9694a;--accent2:#e0a458;--accent3:#7faa8b;--good:#7faa8b;--bad:#d9694a;--display:'Bricolage Grotesque',sans-serif;--glow:0 14px 40px rgba(217,105,74,.28);--chip:rgba(217,105,74,.14)}
  [data-theme="pixel"]{--bg1:#1e2029;--bg2:#282a38;--bg3:#14151e;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.09);--line:rgba(54,224,200,.20);--text:#eef1f5;--muted:#929ab0;--accent:#36e0c8;--accent2:#ff5d9e;--accent3:#ffd84d;--good:#36e0c8;--bad:#ff5d6c;--display:'Pixelify Sans',sans-serif;--glow:0 0 40px rgba(54,224,200,.3);--chip:rgba(54,224,200,.14)}
  [data-theme="avatar"]{--bg1:#1c262d;--bg2:#253139;--bg3:#131c20;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.10);--line:rgba(47,167,216,.18);--text:#e8f0f4;--muted:#8ba0a8;--accent:#f3a13c;--accent2:#2fa7d8;--accent3:#5fb87a;--good:#5fb87a;--bad:#e0533f;--display:'Bricolage Grotesque',sans-serif;--glow:0 0 40px rgba(47,167,216,.3);--chip:rgba(243,161,60,.14)}
  /* ===== LIGHT mode (tinted paper, default) ===== */
  [data-theme="spellbound"][data-mode="light"]{--bg1:#f3efff;--bg2:#ffffff;--bg3:#e7defc;--surface:rgba(43,27,94,.04);--surface2:rgba(43,27,94,.07);--line:rgba(124,92,255,.2);--text:#2b1b5e;--muted:#7e70b4;--accent:#6b4df0;--accent2:#e0a516;--accent3:#5a3fd0;--good:#1fa377;--bad:#e04b6a;--chip:rgba(124,92,255,.14);--glow:0 18px 48px rgba(124,92,255,.2)}
  [data-theme="marquee"][data-mode="light"]{--bg1:#f4ecdb;--bg2:#fffaf0;--bg3:#eaddc7;--surface:rgba(60,40,0,.035);--surface2:rgba(60,40,0,.06);--line:rgba(150,110,30,.22);--text:#2a2014;--muted:#7d6a4c;--accent:#bd820e;--accent2:#9a6c0c;--accent3:#5a3f10;--good:#2f9e72;--bad:#c43e62;--chip:rgba(189,130,14,.16);--glow:0 18px 50px rgba(150,110,30,.16)}
  [data-theme="aurora"][data-mode="light"]{--bg1:#eef0fb;--bg2:#ffffff;--bg3:#e3e7f6;--surface:rgba(20,22,50,.04);--surface2:rgba(20,22,50,.07);--line:rgba(40,40,90,.16);--text:#1b1d33;--muted:#5c6184;--accent:#6a4cf0;--accent2:#1f9fd0;--accent3:#5a3fd0;--good:#1fa377;--bad:#e04b4b;--chip:rgba(106,76,240,.14);--glow:0 18px 48px rgba(106,76,240,.18)}
  [data-theme="anime"][data-mode="light"]{--bg1:#fbeef5;--bg2:#fffafd;--bg3:#f4e2ee;--surface:rgba(40,15,30,.04);--surface2:rgba(40,15,30,.07);--line:rgba(120,40,80,.16);--text:#2a1722;--muted:#876a80;--accent:#e63a7e;--accent2:#0e9fc4;--accent3:#c41f6a;--good:#1fa377;--bad:#e04b4b;--chip:rgba(230,58,126,.13);--glow:0 18px 44px rgba(230,58,126,.18)}
  [data-theme="science"][data-mode="light"]{--bg1:#eef5f0;--bg2:#fbfffd;--bg3:#e2efe8;--surface:rgba(15,30,20,.04);--surface2:rgba(15,30,20,.07);--line:rgba(30,80,40,.16);--text:#14201a;--muted:#5a7068;--accent:#1f9e0f;--accent2:#0e8fb0;--accent3:#1f8e0c;--good:#1f9e0f;--bad:#d23a3a;--chip:rgba(31,158,15,.13);--glow:0 18px 44px rgba(31,158,15,.16)}
  [data-theme="origami"][data-mode="light"]{--bg1:#f6efe4;--bg2:#fffbf3;--bg3:#ece0cf;--surface:rgba(40,30,15,.04);--surface2:rgba(40,30,15,.07);--line:rgba(130,90,40,.18);--text:#241c12;--muted:#8a7558;--accent:#c8593a;--accent2:#b9803a;--accent3:#b04a2e;--good:#3f7d5e;--bad:#c8593a;--chip:rgba(200,89,58,.14);--glow:0 18px 44px rgba(200,89,58,.16)}
  [data-theme="pixel"][data-mode="light"]{--bg1:#eef2f7;--bg2:#fdfeff;--bg3:#e3e9f1;--surface:rgba(15,25,40,.04);--surface2:rgba(15,25,40,.07);--line:rgba(20,90,80,.16);--text:#161a26;--muted:#5e667e;--accent:#11a892;--accent2:#e63a86;--accent3:#0e9a86;--good:#11a892;--bad:#e04b58;--chip:rgba(17,168,146,.14);--glow:0 18px 44px rgba(17,168,146,.16)}
  [data-theme="avatar"][data-mode="light"]{--bg1:#eaf3f6;--bg2:#fbffff;--bg3:#ddeaef;--surface:rgba(15,30,40,.04);--surface2:rgba(15,30,40,.07);--line:rgba(30,90,120,.16);--text:#14242a;--muted:#5a7078;--accent:#d98a2a;--accent2:#1c7fa8;--accent3:#c47318;--good:#3f8a5a;--bad:#cc4632;--chip:rgba(217,138,42,.14);--glow:0 18px 44px rgba(28,127,168,.18)}
  /* ===== WHITE mode ===== */
  [data-theme][data-mode="white"]{--bg1:#ffffff;--bg2:#ffffff;--bg3:#f1f1f4;--surface:rgba(20,18,30,.03);--surface2:rgba(20,18,30,.06);--line:rgba(20,18,30,.12);--text:#1b1822;--slw:#2a2536;--muted:#6a6573;--accent2:color-mix(in srgb,var(--accent2) 55%,#000);--accent3:color-mix(in srgb,var(--accent) 62%,#000);--good:#1f9e6a;--bad:#d23a52;--glow:0 14px 36px rgba(20,18,40,.12);--chip:color-mix(in srgb,var(--accent) 13%,transparent)}
  [data-theme="science"][data-mode="white"]{--accent:#1f9e0f}
  [data-theme="pixel"][data-mode="white"]{--accent:#11a892}
  /* signature motif */
  [data-theme]{position:relative}
  [data-theme]::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.16;background-image:radial-gradient(color-mix(in srgb,var(--accent) 24%,transparent) 1.3px,transparent 1.3px);background-size:26px 26px}
  [data-theme="marquee"]::before{opacity:.5;background-image:radial-gradient(circle at 50% 9px,color-mix(in srgb,var(--accent) 36%,transparent) 2px,transparent 3px);background-size:34px 18px;background-repeat:repeat-x;background-position:top}
  [data-theme="science"]::before{opacity:.1;background-image:linear-gradient(color-mix(in srgb,var(--accent) 26%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb,var(--accent) 26%,transparent) 1px,transparent 1px);background-size:34px 34px}
  [data-theme="pixel"]::before{opacity:.14;background-image:linear-gradient(color-mix(in srgb,var(--accent) 22%,transparent) 2px,transparent 2px),linear-gradient(90deg,color-mix(in srgb,var(--accent) 22%,transparent) 2px,transparent 2px);background-size:18px 18px}
  /* concept animation engine */
  @keyframes ca-pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  @keyframes ca-sl{0%{transform:translateX(-72px);opacity:0}100%{transform:translateX(0);opacity:1}}
  @keyframes ca-sr{0%{transform:translateX(72px);opacity:0}100%{transform:translateX(0);opacity:1}}
  @keyframes ca-up{0%{transform:translateY(28px);opacity:0}100%{transform:translateY(0);opacity:1}}
  @keyframes ca-morph{0%{transform:rotateX(0)}42%{transform:rotateX(88deg);opacity:.2}60%{transform:rotateX(88deg);opacity:.2}100%{transform:rotateX(0);opacity:1}}
  @keyframes ca-glow{0%,100%{filter:none}50%{filter:brightness(1.12) drop-shadow(0 0 9px color-mix(in srgb,var(--accent) 55%,transparent))}}
  @keyframes sb-bee-bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
  /* livelier "talking" loop: hop, lean side to side, little scale pulses */
  @keyframes sb-bee-talk{0%{transform:translate(0,0) rotate(-5deg) scale(1)}20%{transform:translate(-3px,-9px) rotate(3deg) scale(1.05)}40%{transform:translate(2px,-2px) rotate(6deg) scale(1)}60%{transform:translate(4px,-8px) rotate(-2deg) scale(1.04)}80%{transform:translate(-2px,-1px) rotate(-6deg) scale(1)}100%{transform:translate(0,0) rotate(-5deg) scale(1)}}
  @keyframes sb-bee-pop{0%{transform:scale(.55) translateY(14px) rotate(-12deg);opacity:0}65%{transform:scale(1.12) translateY(-2px) rotate(4deg)}100%{transform:scale(1) translateY(0) rotate(0);opacity:1}}
  /* ==== cover-art motion library — each card's art moves like the thing it depicts ==== */
  @keyframes sb-art-float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-5px) rotate(1.5deg)}}
  @keyframes sb-art-wig{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.16) rotate(-7deg)}60%{transform:scale(1.1) rotate(6deg)}100%{transform:scale(1.12) rotate(0)}}
  @keyframes sb-m-fly{0%,100%{transform:translate(-4px,0) rotate(-4deg)}25%{transform:translate(0,-6px) rotate(2deg)}50%{transform:translate(4px,-2px) rotate(5deg)}75%{transform:translate(1px,-7px) rotate(0)}}
  @keyframes sb-m-swim{0%,100%{transform:translateX(-5px) rotate(-3deg)}50%{transform:translateX(5px) rotate(3deg)}}
  @keyframes sb-m-grow{0%,100%{transform:scale(1,.96) translateY(1px)}50%{transform:scale(1.04,1.05) translateY(-2px)}}
  @keyframes sb-m-flash{0%,58%,100%{opacity:1;filter:brightness(1)}60%,66%{opacity:1;filter:brightness(1.9) drop-shadow(0 0 8px rgba(255,255,255,.9))}63%{opacity:.55}}
  @keyframes sb-m-sparkle{0%,100%{filter:brightness(1)}30%{filter:brightness(1.55) drop-shadow(0 0 7px rgba(255,255,255,.8));transform:rotate(-3deg) scale(1.04)}60%{filter:brightness(1.1)}}
  @keyframes sb-m-spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  @keyframes sb-m-tick{0%,7%{transform:rotate(0)}8%,15%{transform:rotate(30deg)}16%,24%{transform:rotate(60deg)}25%,32%{transform:rotate(90deg)}33%,99%{transform:rotate(90deg) scale(1)}100%{transform:rotate(0)}}
  @keyframes sb-m-beat{0%,100%{transform:scale(1)}12%{transform:scale(1.12)}24%{transform:scale(1)}36%{transform:scale(1.09)}48%{transform:scale(1)}}
  @keyframes sb-m-swing{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  @keyframes sb-m-rock{0%,100%{transform:rotate(-6deg) translateY(0)}25%{transform:rotate(0) translateY(-2px)}50%{transform:rotate(6deg) translateY(0)}75%{transform:rotate(0) translateY(2px)}}
  @keyframes sb-m-shake{0%,84%,100%{transform:translate(0) rotate(0)}86%{transform:translate(-2px,-1px) rotate(-4deg)}89%{transform:translate(2px,1px) rotate(4deg)}92%{transform:translate(-2px,1px) rotate(-3deg)}95%{transform:translate(2px,-1px) rotate(3deg)}98%{transform:translate(0)}}
  @keyframes sb-m-drive{0%,100%{transform:translateX(-7px)}48%,55%{transform:translateX(7px) translateY(-1px)}}
  .sb-theme-art{animation:sb-art-float 3.6s ease-in-out infinite;transform-origin:50% 60%}
  .sb-theme-art.m-fly{animation:sb-m-fly 4.2s ease-in-out infinite}
  .sb-theme-art.m-swim{animation:sb-m-swim 3.8s ease-in-out infinite}
  .sb-theme-art.m-grow{animation:sb-m-grow 3.2s ease-in-out infinite;transform-origin:50% 95%}
  .sb-theme-art.m-flash{animation:sb-m-flash 4.4s linear infinite}
  .sb-theme-art.m-sparkle{animation:sb-m-sparkle 3.4s ease-in-out infinite}
  .sb-theme-art.m-spin{animation:sb-m-spin 14s linear infinite;transform-origin:50% 50%}
  .sb-theme-art.m-tick{animation:sb-m-tick 8s linear infinite;transform-origin:50% 50%}
  .sb-theme-art.m-beat{animation:sb-m-beat 2.6s ease-in-out infinite}
  .sb-theme-art.m-swing{animation:sb-m-swing 3s ease-in-out infinite;transform-origin:50% 10%}
  .sb-theme-art.m-rock{animation:sb-m-rock 4.4s ease-in-out infinite;transform-origin:50% 85%}
  .sb-theme-art.m-shake{animation:sb-m-shake 3.8s linear infinite}
  .sb-theme-art.m-drive{animation:sb-m-drive 4.6s ease-in-out infinite}
  .sb-cover-card:hover .sb-theme-art,.sb-lift:hover .sb-theme-art,.sb-arcade-card:hover .sb-theme-art{animation:sb-art-wig .5s ease both}
  .sb-lift{transition:transform .16s ease,box-shadow .16s ease}
  .sb-lift:hover{transform:translateY(-2px)}
  /* ==== game covers: little scenes. Timelines share one duration so parts stay in sync ==== */
  @keyframes sb-ga-press{0%,55%,100%{transform:translateY(0)}62%,72%{transform:translateY(7px)}80%{transform:translateY(0)}}
  @keyframes sb-ga-squash{0%,60%,100%{transform:scaleY(1)}64%,72%{transform:scaleY(.55)}82%{transform:scaleY(1)}}
  @keyframes sb-ga-ring{0%,63%{transform:scale(.4);opacity:0}68%{opacity:.95}88%,100%{transform:scale(1.5);opacity:0}}
  @keyframes sb-ga-swing{0%,48%,100%{transform:rotate(18deg)}58%,66%{transform:rotate(-14deg)}78%{transform:rotate(18deg)}}
  @keyframes sb-ga-brace{0%,58%,100%{transform:translateX(0) rotate(0)}62%,68%{transform:translateX(-2.5px) rotate(-4deg)}76%{transform:translateX(0)}}
  @keyframes sb-ga-spark{0%,59%,74%,100%{opacity:0;transform:scale(.4)}63%,68%{opacity:1;transform:scale(1.15)}}
  @keyframes sb-ga-cell{0%,100%{fill-opacity:.14}12%,22%{fill-opacity:.95}34%{fill-opacity:.14}}
  @keyframes sb-ga-star{0%,68%,100%{opacity:0;transform:scale(.3) rotate(-20deg)}74%,88%{opacity:1;transform:scale(1.1) rotate(8deg)}94%{opacity:0}}
  @keyframes sb-ga-flame{0%,100%{transform:scaleY(1) skewX(0)}25%{transform:scaleY(1.07) skewX(-3deg)}50%{transform:scaleY(.95) skewX(2deg)}75%{transform:scaleY(1.05) skewX(-1.5deg)}}
  @keyframes sb-ga-ember{0%{transform:translateY(2px);opacity:0}25%{opacity:.9}100%{transform:translateY(-11px);opacity:0}}
  @keyframes sb-ga-scan{0%,100%{transform:translateX(-8px)}42%,58%{transform:translateX(8px)}}
  @keyframes sb-ga-snapL{0%,100%{transform:translateX(-6px)}42%,72%{transform:translateX(0)}86%{transform:translateX(-1.5px)}}
  @keyframes sb-ga-snapR{0%,100%{transform:translateX(6px)}42%,72%{transform:translateX(0)}86%{transform:translateX(1.5px)}}
  @keyframes sb-ga-tickpop{0%,44%,100%{opacity:0;transform:scale(.4)}52%,78%{opacity:1;transform:scale(1)}}
  @keyframes sb-ga-orbit{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  @keyframes sb-ga-joy{0%,100%{transform:rotate(-16deg)}45%,55%{transform:rotate(16deg)}}
  @media (prefers-reduced-motion: reduce){.sb-theme-art,.sb-ga *,[class^="sb-ga"]{animation:none!important}}
  .sb-bee-presenter{animation:sb-bee-pop .5s ease both, sb-bee-bob 2.4s ease-in-out .5s infinite;transform-origin:50% 90%}
  .sb-bee-presenter.talking{animation:sb-bee-pop .45s ease both, sb-bee-talk 1.5s ease-in-out .45s infinite;transform-origin:50% 90%}
  @keyframes sb-confetti{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-6px) rotate(calc(var(--r,0deg) + 12deg))}}
  @keyframes sb-arcade{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .sb-arcade-card{background-size:180% 180%;animation:sb-arcade 9s ease-in-out infinite}
  /* covers are clipped BY the card, so the color meets the card edge exactly; the mask keeps
     the rounded clip alive mid-transform (Safari/Chrome compositing bug) */
  .sb-cover-card{transition:transform .16s ease,box-shadow .16s ease;overflow:hidden;isolation:isolate;-webkit-mask-image:-webkit-radial-gradient(white,black)}
  .sb-cover-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(43,27,94,.12)!important}
  @keyframes sb-rise{from{transform:translateY(12px)}to{transform:translateY(0)}}
  @keyframes sb-pop{0%{transform:scale(.86)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes sb-fade{from{opacity:0}to{opacity:1}}
  @keyframes sb-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes sb-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes sb-spin{to{transform:rotate(360deg)}}
  /* EvoLadder emblem motions */
  @keyframes ev-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes ev-spin{to{transform:rotate(360deg)}}
  @keyframes ev-pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes ev-sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  @keyframes ev-blink{0%,100%{opacity:1}50%{opacity:.35}}
