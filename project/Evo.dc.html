<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="display:grid;place-items:center;width:100%;height:100%">
  <sc-if value="{{ isSpellbound }}" hint-placeholder-val="{{ true }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="width:20px;height:26px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:linear-gradient(160deg,#f3d68f,#d9a13a);box-shadow:inset -2px -3px 4px rgba(0,0,0,.16)"></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:32px;height:18px"><span style="position:absolute;left:0;top:3px;width:12px;height:12px;border-radius:50%;background:#f0c24a"></span><span style="position:absolute;left:8px;top:1px;width:13px;height:13px;border-radius:50%;background:#e8b53a"></span><span style="position:absolute;left:17px;top:2px;width:12px;height:12px;border-radius:50%;background:#e0a82e"></span><span style="position:absolute;left:25px;top:5px;width:5px;height:5px;border-radius:50%;background:#2b1b5e"></span></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:18px;height:27px;border-radius:9px;background:linear-gradient(160deg,#f1c264,#d6962a);overflow:hidden"><span style="position:absolute;left:0;right:0;top:8px;height:3px;background:rgba(0,0,0,.2)"></span><span style="position:absolute;left:0;right:0;top:15px;height:3px;background:rgba(0,0,0,.2)"></span></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="width:30px;height:34px"><dc-import name="SpellboundMascot" mood="happy" hint-size="30px,34px" style="width:30px;height:34px"></dc-import></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:34px;height:42px"><span style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:20px;height:10px;background:var(--accent);clip-path:polygon(0 100%,0 38%,22% 72%,50% 0,78% 72%,100% 38%,100% 100%);z-index:2"></span><span style="position:absolute;left:2px;top:8px;width:30px;height:34px"><dc-import name="SpellboundMascot" mood="love" hint-size="30px,34px" style="width:30px;height:34px"></dc-import></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isGalaxy }}" hint-placeholder-val="{{ false }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="position:relative;width:32px;height:20px"><span style="width:33px;height:18px;border-radius:50%;background:radial-gradient(ellipse at 30% 35%,var(--accent2),var(--accent) 55%,transparent 72%)"></span><span style="position:absolute;left:9px;top:5px;width:15px;height:13px;border-radius:50%;background:color-mix(in srgb,var(--accent2) 70%,#000)"></span></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:24px"><span style="position:absolute;left:3px;top:0;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--slw),var(--accent) 60%,color-mix(in srgb,var(--accent) 55%,#000))"></span><span style="position:absolute;left:-2px;top:9px;width:34px;height:8px;border-radius:50%;border:2px solid var(--accent2);transform:rotate(-18deg)"></span></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="width:26px;height:26px;background:var(--accent2);clip-path:polygon(50% 0,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0 50%,40% 40%);box-shadow:0 0 9px var(--accent2)"></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="width:34px;height:30px;border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--accent2),var(--accent) 48%,color-mix(in srgb,var(--accent) 55%,#000) 82%);filter:blur(0.6px)"></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:36px;height:22px;display:grid;place-items:center"><span style="width:36px;height:20px;border-radius:50%;transform:rotate(-20deg);background:radial-gradient(ellipse at 50% 50%,var(--slw),var(--accent) 24%,var(--accent2) 52%,transparent 74%);box-shadow:0 0 8px color-mix(in srgb,var(--accent) 45%,transparent)"><span style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent,color-mix(in srgb,var(--accent2) 55%,transparent) 55deg,transparent 120deg,color-mix(in srgb,var(--slw) 45%,transparent) 240deg,transparent 305deg)"></span></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isMarquee }}" hint-placeholder-val="{{ false }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="width:24px;height:26px;background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 75%,transparent),transparent);clip-path:polygon(38% 0,62% 0,100% 100%,0 100%)"></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="width:28px;height:18px;border-radius:3px;background:var(--accent2);box-shadow:inset 0 0 0 2px color-mix(in srgb,#000 22%,transparent)"></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="width:25px;height:25px;background:var(--accent);clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);box-shadow:0 0 8px color-mix(in srgb,var(--accent) 50%,transparent)"></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:30px;display:block"><span style="position:absolute;left:50%;top:1px;transform:translateX(-50%);width:18px;height:18px;background:var(--accent);clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%)"></span><span style="position:absolute;left:2px;bottom:5px;right:2px;height:4px;border-radius:2px;background:var(--accent2)"></span></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:34px;height:26px"><span style="position:absolute;inset:0 0 6px 0;border:2px solid var(--accent);border-radius:15px 15px 4px 4px;background:color-mix(in srgb,var(--accent) 14%,transparent)"></span><span style="position:absolute;left:6px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--accent2)"></span><span style="position:absolute;left:50%;top:5px;margin-left:-2px;width:4px;height:4px;border-radius:50%;background:var(--accent2)"></span><span style="position:absolute;right:6px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--accent2)"></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isAnime }}" hint-placeholder-val="{{ false }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="width:16px;height:16px;background:var(--accent);clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);box-shadow:0 0 6px color-mix(in srgb,var(--accent) 55%,transparent)"></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="width:30px;height:5px;background:linear-gradient(90deg,var(--accent),var(--slw));border-radius:1px 3px 3px 1px;transform:rotate(-42deg);box-shadow:0 0 6px color-mix(in srgb,var(--accent) 50%,transparent)"></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:30px;display:block"><span style="position:absolute;left:50%;top:50%;width:30px;height:5px;margin:-2.5px 0 0 -15px;background:linear-gradient(90deg,var(--accent),var(--slw));border-radius:1px 3px 3px 1px;transform:rotate(-42deg)"></span><span style="position:absolute;left:50%;top:50%;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;border-radius:2px;background:var(--accent);transform:rotate(45deg)"></span></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:32px;height:32px;display:block"><span style="position:absolute;inset:2px;border:2px solid color-mix(in srgb,var(--accent) 55%,transparent);border-radius:50%"></span><span style="position:absolute;left:50%;top:50%;width:30px;height:5px;margin:-2.5px 0 0 -15px;background:linear-gradient(90deg,var(--accent),var(--slw));border-radius:1px 3px 3px 1px;transform:rotate(-42deg)"></span><span style="position:absolute;left:50%;top:50%;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;border-radius:2px;background:var(--accent);transform:rotate(45deg)"></span></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:34px;height:34px;display:block"><span style="position:absolute;inset:1px;border:2px solid var(--accent);border-radius:50%;box-shadow:0 0 7px color-mix(in srgb,var(--accent) 45%,transparent)"></span><span style="position:absolute;left:50%;top:50%;width:32px;height:5px;margin:-2.5px 0 0 -16px;background:linear-gradient(90deg,var(--accent),var(--slw));border-radius:1px 3px 3px 1px;transform:rotate(-42deg)"></span><span style="position:absolute;left:50%;top:50%;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;border-radius:2px;background:var(--accent);transform:rotate(45deg)"></span><span style="position:absolute;top:0;right:2px;width:8px;height:8px;background:var(--accent);clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%)"></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isOrigami }}" hint-placeholder-val="{{ false }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="width:24px;height:24px;background:linear-gradient(135deg,var(--accent) 50%,var(--accent2) 50%);box-shadow:0 1px 3px rgba(0,0,0,.2)"></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:26px"><span style="position:absolute;bottom:0;left:0;width:30px;height:11px;background:var(--accent2);clip-path:polygon(0 0,100% 0,82% 100%,18% 100%)"></span><span style="position:absolute;top:0;left:50%;width:14px;height:16px;margin-left:-7px;background:var(--accent);clip-path:polygon(50% 0,100% 100%,0 100%)"></span></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="width:30px;height:24px;background:var(--accent);clip-path:polygon(50% 0,100% 100%,50% 76%,0 100%);box-shadow:0 1px 3px rgba(0,0,0,.18)"></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:26px"><span style="position:absolute;bottom:0;left:5px;width:20px;height:13px;background:var(--accent2);clip-path:polygon(0 40%,50% 0,100% 40%,80% 100%,20% 100%)"></span><span style="position:absolute;top:0;left:13px;width:5px;height:14px;background:var(--accent);transform:rotate(12deg)"></span><span style="position:absolute;top:-1px;left:9px;width:9px;height:5px;background:var(--accent);clip-path:polygon(0 50%,100% 0,100% 100%)"></span></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:30px;height:28px;display:block"><span style="position:absolute;bottom:0;left:2px;width:26px;height:16px;border-radius:62% 72% 50% 50%/74% 74% 42% 42%;background:var(--accent2)"></span><span style="position:absolute;top:0;left:15px;width:13px;height:19px;border:4px solid var(--accent2);border-bottom:none;border-right:none;border-radius:14px 0 0 0;transform:rotate(12deg)"></span><span style="position:absolute;top:-1px;left:12px;width:7px;height:7px;border-radius:50%;background:var(--accent2)"></span><span style="position:absolute;top:2px;left:7px;width:7px;height:4px;background:var(--accent);clip-path:polygon(0 0,100% 50%,0 100%)"></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isAvatar }}" hint-placeholder-val="{{ false }}">
    <sc-if value="{{ s0 }}" hint-placeholder-val="{{ true }}"><span style="width:26px;height:26px;border:4px solid var(--accent2);border-right-color:transparent;border-top-color:transparent;border-radius:50%;transform:rotate(-20deg)"></span></sc-if>
    <sc-if value="{{ s1 }}" hint-placeholder-val="{{ false }}"><span style="width:22px;height:22px;background:radial-gradient(circle at 35% 30%,var(--slw),var(--accent2));border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span></sc-if>
    <sc-if value="{{ s2 }}" hint-placeholder-val="{{ false }}"><span style="width:26px;height:20px;background:var(--accent3);clip-path:polygon(15% 0,85% 0,100% 58%,76% 100%,24% 100%,0 58%);box-shadow:inset 0 -3px 4px rgba(0,0,0,.18)"></span></sc-if>
    <sc-if value="{{ s3 }}" hint-placeholder-val="{{ false }}"><span style="width:22px;height:27px;background:linear-gradient(180deg,#ffb24d,#ff5a2a);clip-path:polygon(50% 0,74% 34%,66% 54%,88% 70%,50% 100%,12% 70%,34% 54%,26% 34%)"></span></sc-if>
    <sc-if value="{{ s4 }}" hint-placeholder-val="{{ false }}"><span style="position:relative;width:32px;height:32px;display:grid;place-items:center"><span style="width:14px;height:14px;border-radius:50%;background:#13202a;position:relative;z-index:1;display:grid;place-items:center"><span style="width:6px;height:9px;background:#eaf6ff;clip-path:polygon(50% 0,100% 50%,70% 50%,70% 100%,30% 100%,30% 50%,0 50%)"></span></span><span style="position:absolute;top:0;left:50%;width:7px;height:7px;margin-left:-3.5px;border-radius:50%;background:var(--accent2)"></span><span style="position:absolute;bottom:0;left:50%;width:7px;height:7px;margin-left:-3.5px;border-radius:50%;background:#ff6a3d"></span><span style="position:absolute;left:0;top:50%;width:7px;height:7px;margin-top:-3.5px;border-radius:50%;background:var(--accent3)"></span><span style="position:absolute;right:0;top:50%;width:7px;height:7px;margin-top:-3.5px;border-radius:50%;background:var(--slw)"></span></span></sc-if>
  </sc-if>
  <sc-if value="{{ isOther }}" hint-placeholder-val="{{ false }}">
    <span style="position:relative;display:grid;place-items:center">
      <span style="{{ genStyle }}"></span>
      <sc-if value="{{ genRing }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;width:150%;height:62%;border:2px solid var(--accent2);border-radius:50%;transform:rotate(-18deg)"></span></sc-if>
      <sc-if value="{{ genStar }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;top:-5px;right:-5px;width:11px;height:11px;background:var(--accent2);clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%)"></span></sc-if>
    </span>
  </sc-if>
</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:60,&quot;height&quot;:60},&quot;theme&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;stage&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const t = this.props.theme || 'spellbound';
    const s = Number(this.props.stage) || 0;
    const gsize = 20 + s * 7;
    const special = ['spellbound', 'aurora', 'marquee', 'anime', 'origami', 'avatar'];
    return {
      isSpellbound: t === 'spellbound', isGalaxy: t === 'aurora', isMarquee: t === 'marquee',
      isAnime: t === 'anime', isOrigami: t === 'origami', isAvatar: t === 'avatar', isOther: !special.includes(t),
      s0: s === 0, s1: s === 1, s2: s === 2, s3: s === 3, s4: s === 4,
      genStyle: `width:${gsize}px;height:${gsize}px;border-radius:50%;background:radial-gradient(circle at 38% 32%,var(--slw),var(--accent) 55%,color-mix(in srgb,var(--accent) 60%,#000));box-shadow:0 0 ${4 + s * 3}px color-mix(in srgb,var(--accent) ${30 + s * 12}%,transparent)`,
      genRing: s >= 3, genStar: s >= 4,
    };
  }
}
</script>
</body>
</html>
