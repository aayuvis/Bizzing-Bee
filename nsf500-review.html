<script>
const D=JSON.parse(document.getElementById("data").textContent);
const W=D.w, PATL=D.patl, PATC=D.patc;
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pat=document.getElementById("pat");
Object.keys(PATL).forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=PATL[k];pat.appendChild(o);});
const by=k=>W.filter(w=>w.pat===k).length;
document.getElementById("stats").innerHTML=[["Words",W.length],["Levels","3–5"],["Silent-letter",by("silent")],["Double-letter",by("double")],["French",by("french")],["Greek",by("greek")]].map(([s,b])=>`<div class="stat"><b>${typeof b==="number"?b:b}</b><span>${s}</span></div>`).join("");
const F={q:"",pat:"",y:"",sort:"bp"};let shown=0,filtered=[];const PAGE=50;
function match(w){return (!F.pat||w.pat===F.pat)&&(!F.y||w.y==+F.y)&&(!F.q||(w.w+" "+w.d+" "+w.h+" "+w.r).toLowerCase().includes(F.q));}
function srt(a,b){if(F.sort==="az")return a.w.localeCompare(b.w);if(F.sort==="len")return a.w.length-b.w.length||a.w.localeCompare(b.w);return b.bp-a.bp||a.w.localeCompare(b.w);}
function card(w){const col=PATC[w.pat]||"#999";return `<div class="w">
  <div class="wtop"><span class="word">${esc(w.w)}</span><span class="say">${esc(w.p)}</span><span class="pat" style="background:${col}">${esc(PATL[w.pat]||w.pat)}</span></div>
  <div class="def">${esc(w.d)}</div>
  <div class="meta"><span class="yb">Level ${w.y}</span><span>${esc(w.o)}${w.ps?" · "+esc(w.ps):""}</span><span>bee-prob ${w.bp}</span></div>
  ${w.h?`<div class="hint"><b>Remember:</b> ${esc(w.h)}</div>`:""}
</div>`;}
function apply(){filtered=W.filter(match).sort(srt);shown=0;document.getElementById("list").innerHTML="";document.getElementById("count").textContent=filtered.length+" word"+(filtered.length===1?"":"s");render();}
function render(){const s=filtered.slice(shown,shown+PAGE);document.getElementById("list").insertAdjacentHTML("beforeend",s.map(card).join(""));shown+=s.length;document.getElementById("more").hidden=shown>=filtered.length;}
document.getElementById("more").onclick=render;
let t;document.getElementById("q").oninput=e=>{clearTimeout(t);t=setTimeout(()=>{F.q=e.target.value.trim().toLowerCase();apply();},150);};
pat.onchange=e=>{F.pat=e.target.value;apply();};
document.getElementById("y").onchange=e=>{F.y=e.target.value;apply();};
document.getElementById("sort").onchange=e=>{F.sort=e.target.value;apply();};
document.getElementById("foot").textContent="Bizzing Bee · 500 high-probability NSF Junior finals words, ranked by bee-probability. Added to the app as the 'Mock NSF Junior Final' list.";
apply();
</script>
